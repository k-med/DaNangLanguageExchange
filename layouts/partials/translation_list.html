{{- if .IsTranslated -}}
<div class="page-language-switch" aria-label="{{ i18n "page_language_switch" }}">
    <span class="page-language-switch-label">{{ i18n "swap_language_heading" }}</span>
    <p class="page-language-switch-copy">{{ i18n "swap_language_body" }}</p>
    <div class="page-language-switch-actions">
        {{- range .Translations }}
        <a class="button button-small button-outline" href="{{ .RelPermalink }}">
            {{ i18n "switch_to_label" }} {{ .Language.LanguageName | default (.Lang | title) }}
        </a>
        {{- end }}
    </div>
</div>
{{- end -}}
